# 【容器职责】
#   Client 容器负责接收和处理来自终端用户的 HTTP/HTTPS 请求
#
# 【请求处理流程】
#
#   ┌──────────┐     80/443        ┌─────────────────────────────────┐
#   │  Client  │ ─────────────────▶│      Client 容器 (本配置)        │
#   └──────────┘                   │  1. 域名配置查找                 │
#                                  │  2. HTTPS 强制跳转检查           │
#                                  │  3. ACL 访问控制                 │
#                                  │     - IP 黑白名单                │
#                                  │     - Referer 防盗链             │
#                                  │     - UA 黑白名单                │
#                                  │     - URL 鉴权（时间戳/MD5）      │
#                                  │  4. 缓存 Key 生成                │
#                                  │  5. 请求头处理                   │
#                                  └───────────────┬─────────────────┘
#                                                  │ proxy_pass
#                                                  ▼
#                                  ┌─────────────────────────────────┐
#                                  │         WYCache (缓存服务)        │
#                                  │         监听 8066               │
#                                  └─────────────────────────────────┘
#
# 【OpenResty 生命周期阶段】
#
#   ① init_by_lua           - Master 进程初始化，加载基础模块
#   ② init_worker_by_lua    - Worker 进程初始化，启动配置同步定时器
#   ③ ssl_certificate_by_lua - HTTPS 动态证书加载（仅 443 端口）
#   ④ rewrite_by_lua        - 域名查找、缓存规则匹配、HTTPS 跳转
#   ⑤ access_by_lua         - ACL 访问控制检查
#   ⑥ proxy_pass            - 转发请求到 WYCache 缓存服务
#   ⑦ header_filter_by_lua  - 响应头处理（缓存时间、错误码缓存等）
#
# ============================================================================

worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {

    include mime.types;
    default_type application/octet-stream;

    # ============================================================
    # 日志格式
    # ============================================================

    # 用户请求日志格式
    # 记录完整的请求信息，用于分析和排障
    log_format main '$remote_addr $remote_port $remote_user [$time_local] '
                        '"$request_method $scheme://$host$request_uri $server_protocol" '
                        '$status $request_length $sent_http_content_length $bytes_sent '
                        '$request_time $request_completion "$http_range" "$sent_http_content_range" '
                        '"$http_referer" "$http_cookie" "$http_user_agent" '
                        '$ssl_protocol $tcpinfo_rtt $tcpinfo_rttvar $tcpinfo_snd_cwnd $tcpinfo_rcv_space '
                        '$http_x_request_id $sent_http_content_length'
                        '$server_addr $body_bytes_sent';

    # 关闭全局日志，由各 location 单独配置
    access_log off;

    # ============================================================
    # 性能配置
    # ============================================================

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript image/tiff image/svg+xml;

    # ============================================================
    # Backend 配置
    # ============================================================

    # Backend 上游后端缓存服务
    upstream Backend {
#     todo 切换为实际ip
        server backend:8080;
        keepalive 32;           # 保持连接池，提升性能
    }

    # ============================================================
    # DNS 解析器
    # ============================================================

    resolver 223.5.5.5 114.114.114.114 119.29.29.29 ipv6=off valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # Lua 配置
    # ============================================================

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/nginx/lua/?/init.lua;;";

    # 共享内存字典（所有 Worker 进程共享）
    lua_shared_dict shared_map 100m;  # 域名配置缓存

    # Master 进程初始化
    # 加载核心模块和基础配置
    init_by_lua_block {
        ngx.log(ngx.INFO, "init_by_lua_block")
    }

    # Worker 进程初始化
    # 启动配置同步定时器，预加载业务模块
    init_worker_by_lua_block {
        ngx.log(ngx.INFO, "init_worker_by_lua_block")
    }

    # ============================================================
    # Server 配置
    # ============================================================

    include servers/*.conf;
}
