location / {

    # 用户请求日志
    # 使用 buffer 和 flush 提升写入性能
    access_log /usr/local/openresty/nginx/logs/access.log main buffer=32k flush=5s;

    # rewrite 阶段：域名查找、缓存规则匹配、HTTPS 跳转
    rewrite_by_lua_block {
        ngx.log(ngx.INFO, "rewrite_by_lua_block")
    }

    # access 阶段：ACL 访问控制检查
    access_by_lua_block {
        ngx.log(ngx.INFO, "access_by_lua_block")
    }

    # 转发请求到 Backend 缓存服务
    proxy_pass http://Backend;

    # HTTP/1.1 长连接配置
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # 传递请求头到 Backend
    proxy_set_header Host $host;                              # 原始请求域名
    proxy_set_header X-Real-IP $remote_addr;                  # 客户端真实 IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链
    proxy_set_header X-Forwarded-Proto $scheme;               # 原始协议
    proxy_set_header X-Request-ID $http_x_request_id;   # 请求追踪 ID

    # header_filter 阶段：响应头处理
    header_filter_by_lua_block {
        ngx.log(ngx.INFO, "header_filter_by_lua_block")
    }
}
