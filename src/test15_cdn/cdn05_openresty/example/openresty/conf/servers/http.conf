# ============================================================================
# HTTP Server（端口 80）
# ============================================================================
#
# 【职责】处理 HTTP 协议的客户端请求
#
# 【处理流程】
#   1. 接收用户 HTTP 请求
#   2. 执行 rewrite 阶段：域名查找、缓存规则匹配、HTTPS 跳转检查
#   3. 执行 access 阶段：ACL 访问控制（IP/Referer/UA/URL鉴权）
#   4. 转发请求到 WYCache 缓存服务
#   5. 执行 header_filter 阶段：处理响应头
#
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 请求处理
    include locations/request.conf;

    # 健康检查接口
    include locations/health.conf;
}
