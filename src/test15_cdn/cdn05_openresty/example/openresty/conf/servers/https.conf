# ============================================================================
# HTTPS Server（端口 443）
# ============================================================================
#
# 【职责】处理 HTTPS 协议的客户端请求
#
# 【处理流程】
#   1. 接收用户 HTTPS 请求
#   2. SSL/TLS 握手，动态加载域名对应的 SSL 证书
#   3. 执行 rewrite 阶段：域名查找、缓存规则匹配
#   4. 执行 access 阶段：ACL 访问控制（IP/Referer/UA/URL鉴权）
#   5. 转发请求到 WYCache 缓存服务
#   6. 执行 header_filter 阶段：处理响应头
#
# 【SSL 证书加载】
#   - 使用 ssl_certificate_by_lua 动态加载证书
#   - 根据 SNI（Server Name Indication）匹配域名
#   - 从共享内存缓存中获取证书，避免重复加载
#
# ============================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # 占位证书（Nginx 启动必须配置，实际使用动态加载）
    ssl_certificate     certs/default.crt;
    ssl_certificate_key certs/default.key;

    # TLS 版本配置（仅支持 1.2 和 1.3，禁用不安全的旧版本）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # 动态 SSL 证书加载
    # 根据请求的域名（SNI）动态选择对应的证书
    ssl_certificate_by_lua_block {
        -- local ssl_handler = require "middleware.https.ssl_handler"
        - ssl_handler.handle_ssl()
    }

    # 请求处理
    include locations/request.conf;

    # 健康检查接口
    include locations/health.conf;
}
