syntax = "proto3";

package llm;

service LLM {
  rpc Infer (InferRequest) returns (InferReply);
}

message InferRequest {
  string prompt = 1;
}

message InferReply {
  string text = 1;
}

// 用py做grpc服务端，用go/java做grpc客户端。实现py实现推理功能，go/java实现服务


